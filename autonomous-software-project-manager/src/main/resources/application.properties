# ============================================================
# Google Gemini API (Official AI Studio)
# Get your free API key from: https://aistudio.google.com/apikey
# ============================================================

# Your Google AI Studio API key(s) — comma-separated. Set GEMINI_API_KEYS in your environment.
# Get a free key from: https://aistudio.google.com/apikey
gemini.api.keys=${GEMINI_API_KEYS:}

# ============================================================
# Tavily Search API (free tier) — used by MarketResearchTool
# ============================================================
tavily.api-key=${TAVILY_API_KEY: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}
tavily.base-url=https://api.tavily.com
tavily.max-results=5
tavily.search-depth=basic
# Model to use (gemini-2.5-flash is free tier on AI Studio)
gemini.model.name=gemini-2.5-flash

# Maximum tokens in LLM response
gemini.max.tokens=4096

# Temperature (0.0 = deterministic, 1.0 = creative)
gemini.temperature=0.2

# Request timeout in seconds
gemini.timeout.seconds=120

# ============================================================
# Per-Agent Output Token Budgets (Token Management Layer)
# Spec: specs/docs/token-management.md
# ============================================================
token.budget.requirement-analyst=800
token.budget.business-analyst=1200
token.budget.database-architect=1000
token.budget.project-planner=1500
token.budget.risk-analyst=800
